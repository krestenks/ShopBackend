#Gradle Daemon JVM criteria (see `./gradlew updateDaemonJvm`).
#Pin the Gradle daemon to Java 17: Kotlin 1.9.10's compiler cannot parse newer Java
#version strings (e.g. Java 26). Upsun already launches gradlew on java-17-openjdk, so
#this is a no-op there; locally it makes Gradle use an installed JDK 17 toolchain.
toolchainVersion=17
